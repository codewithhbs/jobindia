version: "3.9"
services:
  api:
    build: .
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/jobmarketplace
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis
    volumes:
      - ./uploads:/app/uploads
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  mongo_data:
